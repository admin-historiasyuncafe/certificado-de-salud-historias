<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2229"/>
      <stop offset="100%" stop-color="#12151A"/>
    </linearGradient>

    <!-- Outer/Inner Glow Border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#068388" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#068388" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#a78258" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78258" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Teal Gradient for "d" -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0cd2db"/>
      <stop offset="100%" stop-color="#068388"/>
    </linearGradient>

    <!-- Gold Gradient for "H" -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d5b5"/>
      <stop offset="50%" stop-color="#e9c46a"/>
      <stop offset="100%" stop-color="#a78258"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  
  <!-- Sleek Border -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Subtle Background Decorative Steam/Curve for Cafe vibe -->
  <path d="M25,22 C35,15 45,28 55,22 C65,16 75,28 85,22" fill="none" stroke="#a78258" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="2 2"/>

  <!-- Logo Group with Glow -->
  <g filter="url(#glow)">
    <!-- Lowercase "d" -->
    <!-- Circular body -->
    <path d="M 38,42 A 12,12 0 1,0 38,66" fill="none" stroke="url(#tealGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Vertical stem -->
    <path d="M 38,30 L 38,66" fill="none" stroke="url(#tealGrad)" stroke-width="7" stroke-linecap="round"/>

    <!-- Uppercase "H" -->
    <!-- Left vertical bar -->
    <path d="M 52,30 L 52,66" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Right vertical bar -->
    <path d="M 72,30 L 72,66" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Crossbar -->
    <path d="M 52,48 L 72,48" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
