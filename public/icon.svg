<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background for app icon -->
  <rect width="100" height="100" rx="22" fill="#1E2229"/>
  
  <!-- Subtle inner shadow/glow -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none" stroke="#068388" stroke-width="1.5" stroke-opacity="0.3"/>
  
  <!-- Coffee Cup Group (Centered) -->
  <g transform="translate(5, 12)">
    <!-- Steam -->
    <path d="M30 18c1.5-4 4-4 5 0s4 4 5 0" fill="none" stroke="#a78258" stroke-width="3" stroke-linecap="round"/>
    <path d="M45 18c1.5-4 4-4 5 0s4 4 5 0" fill="none" stroke="#a78258" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Cup Body -->
    <path d="M20 32h42a13 13 0 0 1 13 13v4a13 13 0 0 1-13 13H20a17 17 0 0 1-17-17v-0a17 17 0 0 1 17-17z" fill="#068388"/>
    
    <!-- Cup Handle -->
    <path d="M62 40h10a6 6 0 0 1 6 6v2a6 6 0 0 1-6 6H62" fill="none" stroke="#a78258" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Document emblem inside cup or details -->
    <rect x="22" y="40" width="20" height="14" rx="2" fill="#1E2229" opacity="0.4"/>
    <line x1="26" y1="44" x2="38" y2="44" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="26" y1="49" x2="34" y2="49" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
